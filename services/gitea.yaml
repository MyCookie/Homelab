include:
  - networks/nextcloud.yaml

services:
  gitea:
    image: gitea/gitea:stable
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
    restart: always
    networks:
      - nextcloud
    hostname:
      - gitea
    volumes:
      - $VOLUMES_PATH/gitea/data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
