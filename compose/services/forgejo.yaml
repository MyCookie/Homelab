services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:11
    container_name: forgejo
    restart: always
    networks:
      - nextcloud
    ports:
      - "3000:3000"
      - "8022:22"
    depends_on:
      - mariadb
    environment:
      - USER_UID=1000
      - USER_GID=1000
      # Forgejo 11 breaks compatibility with Gitea
      # Uncomment if deployment was migrated before v7
      # - GITEA_APP_INI=/data/gitea/conf/app.ini
      # - FORGEJO_APP_INI=/data/gitea/conf/app.ini
    volumes:
      - type: bind
        source: /etc/timezone
        target: /etc/timezone
        read_only: true
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
      - type: bind
        source: $VOLUMES_PATH/forgejo/data
        target: /data
        read_only: false
