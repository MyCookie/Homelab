name: nextcloud

include:
  - services/networks/nextcloud.yaml
  - services/audiobookshelf.yaml
  - services/forgejo.yaml
  - services/jellyfin.yaml
  - services/nextcloud.yaml
  - services/nextclouddb.yaml
  - services/synapse.yaml
  - services/youtubedl.yaml

services:
  tailscale:
    image: tailscale/tailscale
    container_name: tailscale
    restart: unless-stopped
    hostname: tailscale
    networks:
      - nextcloud
    env_file: services/env/tailscale.env
    volumes:
      - $VOLUMES_PATH/tailscale/var/lib/tailscale:/var/lib/tailscale
      - $VOLUMES_PATH/tailscale/etc/tailscale/serve/nextcloud.conf:/etc/tailscale/serve/nextcloud.conf
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
