include:
  - networks/tsdproxy.yaml

services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    networks:
      - tsdproxy
    hostname: openwebui
    ports:
      - 8888:8080
    labels:
      - tsdproxy.enable: "true"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1 # alternatively, use `count: all` for all GPUs
              capabilities: [gpu]
    volumes:
      - $VOLUMES_PATH/open-webui/app/backend/data:/app/backend/data
      - $VOLUMES_PATH/ollama/root/.ollama:/root/.ollama
    environment:
      - OLLAMA_BASE_URL=http://localhost:11434
