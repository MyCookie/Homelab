include:
  - networks/homelab.yaml

services:
  synapse:
    image: matrixdotorg/synapse
    container_name: synapse
    hostname: synapse
    restart: no
    user: 1000:1000
    ports:
      - 8008:8008
    networks:
      - homelab
    depends_on:
      - synapsedb
    volumes:
      - type: bind
        source: $VOLUMES_PATH_HDD/synapse/data
        target: /data
        read_only: false

  synapsedb:
    image: postgres:13-alpine
    container_name: synapsedb
    hostname: synapsedb
    restart: always
    networks:
      - homelab
    volumes:
      - type: bind
        source: $VOLUMES_PATH/postgres/data
        target: /var/lib/postgresql/data
        read_only: false
    environment:
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
