services:
  vllm:
    container_name: vllm
    hostname: vllm
    image: vllm/vllm-openai # v0.20.0 or higher
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - spark
    environment:
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    # model supports a maximum context of 262144
    command: >
      Qwen/Qwen3.6-27B-FP8
        --max-model-len 262144
        --gpu-memory-utilization 0.8
        --reasoning-parser qwen3
        --enable-auto-tool-choice
        --tool-call-parser qwen3_coder
        --speculative-config '{"method": "mtp", "num_speculative_tokens": 2}'