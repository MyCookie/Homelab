include:
  - networks/nextcloud.yaml
  - nextclouddb.yaml

services:
  nextcloud:
    image: nextcloud:30
    container_name: nextcloud # only available when deploying using docker-compose
    network_mode: service:tailscale
    restart: no
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1 # alternatively, use `count: all` for all GPUs
              capabilities: [gpu]
    depends_on:
      - ollama
      - minio
      - mariadb
      - redis
      - tailscale
    volumes:
      - $VOLUMES_PATH/nextcloud/var/www/html:/var/www/html

  nextcloud_cron:
    image: nextcloud:30
    container_name: nextcloud-cron
    network_mode: service:tailscale
    restart: no
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1 # alternatively, use `count: all` for all GPUs
              capabilities: [gpu]
    depends_on:
      - minio
      - mariadb
      - redis
      - tailscale
    entrypoint: /cron.sh
    volumes:
      - $VOLUMES_PATH/nextcloud/var/www/html:/var/www/html
