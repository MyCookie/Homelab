include:
  - networks/homelab.yaml

services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    restart: unless-stopped
    networks:
      - homelab
    hostname: audiobookshelf
    ports:
      - "13378:80"
    volumes:
      - $VOLUMES_PATH/audiobookshelf/audiobooks:/audiobooks
      - $VOLUMES_PATH/audiobookshelf/podcasts:/podcasts
      - $VOLUMES_PATH/audiobookshelf/config:/config
      - $VOLUMES_PATH/audiobookshelf/metadata:/metadata
    environment:
      - TZ=America/Edmonton
