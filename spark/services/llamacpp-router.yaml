services:
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda13
    container_name: llamacpp
    restart: no
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - spark
    hostname: llamacpp
    ports:
      - 8000:8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8000
      - LLAMA_ARG_WEBUI=0
      - LLAMA_ARG_ENDPOINT_METRICS=1
      - LLAMA_ARG_MODELS_DIR=/root/.cache/huggingface
      - LLAMA_ARG_MODELS_PRESET=/root/models.ini
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ~/.cache/llamacpp/models.ini:/root/models.ini:ro
