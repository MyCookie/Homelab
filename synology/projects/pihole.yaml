# https://github.com/pi-hole/docker-pi-hole/blob/master/README.md

services:
  pihole:
    container_name: pihole
    image: pihole/pihole:2025.02.7
    networks:
        pihole:
          ipv4_address: 172.18.0.2
    hostname: pihole
    # For DHCP it is recommended to remove these ports and instead add: network_mode: "host"
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      #- "67:67/udp"
      - "8080:80/tcp"
    environment:
      TZ: 'UTC'
      # WEBPASSWORD: 'set a secure password here or it will be random'
    # Volumes store your data between container upgrades
    volumes:
      - '/volume1/docker/volumes/pihole/etc/pihole:/etc/pihole'
      - '/volume1/docker/volumes/pihole/etc/dnsmasq.d:/etc/dnsmasq.d'
    #   https://github.com/pi-hole/docker-pi-hole#note-on-capabilities
    cap_add:
      - NET_ADMIN
    restart: unless-stopped # Recommended but not required (DHCP needs NET_ADMIN)
  unbound:
    container_name: unbound
    image: mvance/unbound:latest
    networks:
      pihole:
        ipv4_address: 172.18.0.3
    hostname: unbound
    volumes:
      - '/volume1/docker/volumes/unbound/opt/unbound/etc/unbound/forward-records.conf:/opt/unbound/etc/unbound/forward-records.conf:ro'
    restart: unless-stopped

networks:
  pihole:
    name: pihole
    ipam:
      config:
        - subnet: 172.18.0.0/16
          gateway: 172.18.0.1
