# https://huggingface.co/unsloth/Qwen3.6-27B-NVFP4/discussions/4
services:
  vllm:
    container_name: vllm
    hostname: vllm
    image: vllm/vllm-openai:v0.22.0 # v0.20.0 or higher
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - spark
    environment:
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    command: >
      unsloth/Qwen3.6-27B-NVFP4
        --trust-remote-code
        --dtype bfloat16
        --max-model-len 262144
        --gpu-memory-utilization 0.8
        --enable-auto-tool-choice
        --tool-call-parser qwen3_coder
        --speculative-config '{"method": "mtp", "num_speculative_tokens": 3}'
