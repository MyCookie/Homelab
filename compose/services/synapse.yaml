include:
  - networks/homelab.yaml

services:
  synapse:
    image: matrixdotorg/synapse
    container_name: synapse
    hostname: synapse
    restart: no
    user: 1000:1000
    ports:
      - 8008:8008
    networks:
      - homelab
    depends_on:
      - synapsedb
    volumes:
      - $VOLUMES_PATH/synapse/data:/data

  synapsedb:
    image: postgres:13-alpine
    container_name: synapsedb
    hostname: synapsedb
    restart: always
    networks:
      - homelab
    volumes:
      - $VOLUMES_PATH/postgres/data:/var/lib/postgresql/data
    environment:
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
