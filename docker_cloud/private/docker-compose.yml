#podman run -it -d --name youtubedl-material --restart always --publish "17442:17442" --volume /pool/services/volumes/youtubedl-material/appdata:/app/appdata --volume /pool/services/volumes/youtubedl-material/audio:/app/audio --volume /pool/services/volumes/youtubedl-material/video:/app/video --volume /pool/services/volumes/youtubedl-material/subscriptions:/app/subscriptions --volume /pool/services/volumes/youtubedl-material/users:/app/users --env "WRITE_YTDL_CONFIG=true" docker.io/tzahi12345/youtubedl-materia

version: '3'

services:
    youtubedl-material:
        image: docker.io/tzahi12345/youtubedl-material:latest
        name: "youtubedl-material"
        restart: always
        environment:
            - "WRITE_YTDL_CONFIG=true"
        publish:
            - 17443:17443
        volumes:
            - /pool/services/volumes/youtubedl-material/appdata:/app/appdata
            - /pool/services/volumes/youtubedl-material/users:/app/users
            - /pool/services/volumes/youtubedl-material/subscriptions:/app/subscriptions
            - /pool/services/volumes/youtubedl-material/audio:/app/audio
            - /pool/services/volumes/youtubedl-material/video:/app/video
