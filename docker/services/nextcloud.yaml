include:
  - networks/nextcloud.yaml

env_file:
  - env/nextcloud.env

services:
  nextcloud:
    image: nextcloud:30
    container_name: nextcloud # only available when deploying using docker-compose
    hostname: nextcloud
    networks:
      - nextcloud
    restart: no
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1 # alternatively, use `count: all` for all GPUs
              capabilities: [gpu]
    depends_on:
      - ollama
      - minio
      - mariadb
      - redis
    volumes:
      - $VOLUMES_PATH/nextcloud/var/www/html:/var/www/html

  nextcloud_cron:
    image: nextcloud:30
    container_name: nextcloud-cron
    hostname: nextcloud-cron
    networks:
      - nextcloud
    restart: no
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1 # alternatively, use `count: all` for all GPUs
              capabilities: [gpu]
    depends_on:
      - minio
      - mariadb
      - redis
    entrypoint: /cron.sh
    volumes:
      - $VOLUMES_PATH/nextcloud/var/www/html:/var/www/html
  
  # Sidecar tailscale to serve Nextcloud over HTTPS
  nextcloud-tailscale:
    image: tailscale/tailscale
    container_name: nextcloud-tailscale
    restart: unless-stopped
    hostname: nextcloud-tailscale
    entrypoint: ["tailsacle", "serve", "http://nextcloud"]
    environment:
      - TS_AUTHKEY=TS_CLIENT_SECRET
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - $VOLUMES_PATH/nextcloud/var/lib/tailscale:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin

  forgejo:
    image: codeberg.org/forgejo/forgejo:7
    container_name: forgejo
    restart: no
    hostname: forgejo
    networks:
      - nextcloud
    ports:
      - 3000:3000
      - "8022:22"
    depends_on:
      - mariadb
    environment:
      - USER_UID=1000
      - USER_GID=1000
    volumes:
      - $VOLUMES_PATH/forgejo/data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

  minio:
    image: quay.io/minio/minio
    restart: unless-stopped
    container_name: minio
    command: 'server /data --console-address ":9001"'
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nextcloud
    ports:
      - 9000-9001:9000-9001
    volumes:
      - $VOLUMES_PATH/minio/data:/data

  adminer:
    image: adminer
    container_name: adminer
    restart: unless-stopped
    hostname: adminer
    networks:
      - nextcloud

  ollama:
    image: ollama/ollama
    container_name: ollama
    hostname: ollama
    restart: unless-stopped
    networks:
      - nextcloud
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1 # alternatively, use `count: all` for all GPUs
              capabilities: [gpu]
    volumes:
      - $VOLUMES_PATH/ollama/root/.ollama:/root/.ollama

  mariadb:
    image: mariadb:10.11
    container_name: mariadb # only available when deploying using docker-compose
    hostname: mariadb
    networks:
      - nextcloud
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW --innodb-read-only-compressed=OFF
    restart: unless-stopped
    volumes:
      - $VOLUMES_PATH/mariadb/var/lib/mysql:/var/lib/mysql

  redis:
    image: redis
    container_name: redis
    hostname: redis
    networks:
      - nextcloud
    restart: unless-stopped
